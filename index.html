<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>2D SURVIVAL ULTIMATE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace}
#wrapper{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 14px;display:flex;gap:14px;align-items:center;background:rgba(0,0,0,0.75);border-bottom:1px solid #333;flex-wrap:wrap;z-index:10;pointer-events:none}
.hud-group{display:flex;align-items:center;gap:6px}
.hud-label{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.hud-val{color:#fff;font-size:13px;font-weight:bold}
.bar-outer{height:10px;border-radius:2px;background:#1a1a1a;border:1px solid #333;overflow:hidden}
#hp-bar-outer{width:140px}
#xp-bar-outer{width:80px}
.bar-inner{height:100%;transition:width .08s}
#hp-bar-inner{background:#e33}
#xp-bar-inner{background:#38f}
#weapon-bar{position:absolute;bottom:0;left:0;width:100%;padding:5px 12px;display:flex;gap:10px;align-items:center;background:rgba(0,0,0,0.8);border-top:1px solid #222;z-index:10;pointer-events:none}
.wslot{padding:3px 10px;border:1px solid #333;border-radius:3px;font-size:11px;color:#555;white-space:nowrap}
.wslot.active{border-color:#ff0;color:#ff0;background:rgba(255,255,0,0.07)}
.wslot.locked{opacity:.25}
.wslot.upgraded{border-color:#4af;color:#4af;background:rgba(64,170,255,0.07)}
#msg-bar{position:absolute;top:44px;left:50%;transform:translateX(-50%);font-size:13px;color:#fa0;letter-spacing:1px;z-index:11;pointer-events:none;text-shadow:0 0 8px #fa0;transition:opacity .3s}
#overlay{position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.85);display:none}
#overlay h1{color:#e33;font-size:52px;letter-spacing:4px;text-shadow:0 0 20px #e33}
#overlay .sub{color:#aaa;font-size:16px;margin-top:12px;letter-spacing:2px}
#overlay .stats{color:#ccc;font-size:14px;margin-top:20px;text-align:center;line-height:2}
#overlay button{margin-top:28px;padding:12px 40px;background:transparent;border:2px solid #e33;color:#e33;font-size:15px;letter-spacing:3px;cursor:pointer;font-family:inherit;text-transform:uppercase;transition:all .2s}
#overlay button:hover{background:#e33;color:#000}
#minimap{position:absolute;bottom:36px;right:12px;z-index:10;border:1px solid #333;opacity:.7}
#controls-hint{position:absolute;top:44px;right:12px;z-index:10;font-size:10px;color:#444;line-height:1.8;pointer-events:none}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="game"></canvas>
  <canvas id="minimap" width="120" height="80"></canvas>

  <div id="hud">
    <div class="hud-group">
      <span class="hud-label">HP</span>
      <div class="bar-outer" id="hp-bar-outer"><div class="bar-inner" id="hp-bar-inner" style="width:100%"></div></div>
      <span class="hud-val" id="hp-text">100</span>
    </div>
    <div class="hud-group">
      <span class="hud-label">XP</span>
      <div class="bar-outer" id="xp-bar-outer"><div class="bar-inner" id="xp-bar-inner" style="width:0%"></div></div>
    </div>
    <div class="hud-group"><span class="hud-label">LV</span><span class="hud-val" id="lv-text">1</span></div>
    <div class="hud-group"><span class="hud-label">WAVE</span><span class="hud-val" id="wave-text">1</span></div>
    <div class="hud-group"><span class="hud-label">KILLS</span><span class="hud-val" id="kill-text">0</span></div>
    <div class="hud-group"><span class="hud-label">SCORE</span><span class="hud-val" id="score-text">0</span></div>
    <div class="hud-group" style="margin-left:auto">
      <span class="hud-label">BOMB</span><span class="hud-val" id="bomb-cd" style="color:#fa0">READY</span>
      <span class="hud-label" style="margin-left:8px">DASH</span><span class="hud-val" id="dash-cd" style="color:#4af">READY</span>
    </div>
  </div>

  <div id="msg-bar"></div>

  <div id="weapon-bar">
    <span class="hud-label">WEAPONS:</span>
    <div class="wslot active" id="ws-0">1· PISTOL Lv1</div>
    <div class="wslot locked" id="ws-1">2· SHOTGUN</div>
    <div class="wslot locked" id="ws-2">3· RAPID</div>
    <div class="wslot locked" id="ws-3">4· SNIPER</div>
    <div class="wslot locked" id="ws-4">5· ROCKET</div>
    <span class="hud-label" style="margin-left:auto;font-size:10px">WASD/Di chuyen · Click/Ban · E/Bom · Shift/Dash · 1-5/Doi sung</span>
  </div>

  <div id="controls-hint">
    W A S D — di chuyen<br>
    Click — ban<br>
    E — bom<br>
    Shift — dash<br>
    1-5 — chon sung
  </div>

  <div id="overlay">
    <h1>GAME OVER</h1>
    <div class="sub">BAN DA KHONG THE TIEP TUC</div>
    <div class="stats" id="final-stats"></div>
    <button onclick="restartGame()">CHOI LAI</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const miniCanvas = document.getElementById("minimap");
const mctx = miniCanvas.getContext("2d");

const SCREEN_W = Math.min(window.innerWidth, 1400);
const SCREEN_H = Math.min(window.innerHeight - 76, 820);
canvas.width = SCREEN_W;
canvas.height = SCREEN_H;

const WORLD_W = 2800;
const WORLD_H = 2000;
const TILE = 60;

let G = {};

function initState() {
  G = {
    player: {
      x: WORLD_W / 2, y: WORLD_H / 2,
      size: 18, speed: 3.2,
      hp: 100, maxHp: 100,
      exp: 0, level: 1,
      kills: 0, score: 0,
      iframes: 0,
      dashActive: 0
    },
    cam: { x: WORLD_W / 2 - SCREEN_W / 2, y: WORLD_H / 2 - SCREEN_H / 2 },
    bullets: [], enemies: [], medkits: [], particles: [], obstacles: [], spawnZones: [],
    wave: 1, waveActive: false, waveTimer: 0, betweenWaveCountdown: 0,
    screenShake: 0,
    cd: { shoot: 0, bomb: 0, dash: 0 },
    keys: {}, mouse: { x: SCREEN_W / 2, y: SCREEN_H / 2 },
    msg: "", msgTimer: 0,
    weapons: [
      { id: 0, name: "PISTOL",  level: 0, unlocked: true,  active: true,  baseCd: 22,  baseDmg: 12, bulletSpd: 9,  spread: 0,    count: 1, color: "#ffe066", bulletSize: 4 },
      { id: 1, name: "SHOTGUN", level: 0, unlocked: false, active: false, baseCd: 45,  baseDmg: 10, bulletSpd: 6.5,spread: 0.22, count: 5, color: "#ff8c00", bulletSize: 5 },
      { id: 2, name: "RAPID",   level: 0, unlocked: false, active: false, baseCd: 8,   baseDmg: 7,  bulletSpd: 10, spread: 0.12, count: 1, color: "#00e5ff", bulletSize: 3 },
      { id: 3, name: "SNIPER",  level: 0, unlocked: false, active: false, baseCd: 60,  baseDmg: 65, bulletSpd: 16, spread: 0,    count: 1, color: "#cc44ff", bulletSize: 5, pierce: true },
      { id: 4, name: "ROCKET",  level: 0, unlocked: false, active: false, baseCd: 80,  baseDmg: 50, bulletSpd: 7,  spread: 0,    count: 1, color: "#ff3300", bulletSize: 7, rocket: true },
    ],
    activeWeapon: 0,
    tick: 0,
    gameOver: false,
    waveEnemyCount: 0,
    killsThisWave: 0,
  };
  G.obstacles = buildObstacles();
  G.spawnZones = buildSpawnZones();
}

function buildObstacles() {
  const obs = [];
  obs.push({ x: 0,         y: 0,         w: WORLD_W, h: 20,      type: "wall" });
  obs.push({ x: 0,         y: WORLD_H-20,w: WORLD_W, h: 20,      type: "wall" });
  obs.push({ x: 0,         y: 0,         w: 20,      h: WORLD_H, type: "wall" });
  obs.push({ x: WORLD_W-20,y: 0,         w: 20,      h: WORLD_H, type: "wall" });

  const walls = [
    [600,400,200,20],[800,400,20,180],[600,560,220,20],
    [1100,300,20,200],[1100,300,200,20],
    [1400,500,180,20],[1400,380,20,140],
    [1700,400,200,20],[1700,400,20,180],[1700,560,200,20],
    [2000,280,20,200],[2000,280,240,20],
    [350,600,20,200],[350,800,160,20],[490,640,20,180],
    [900,700,20,250],[900,700,180,20],[900,930,180,20],
    [1200,650,200,20],[1380,650,20,200],[1380,830,200,20],
    [1600,700,200,20],[1600,700,20,200],[1600,880,200,20],
    [2100,600,20,240],[2100,600,200,20],[2280,600,20,240],
    [400,150,180,20],[400,150,20,140],
    [700,100,20,180],[700,100,220,20],[900,100,20,180],
    [1100,80,200,20],[1280,80,20,200],
    [1450,150,180,20],[1450,150,20,120],
    [1700,100,220,20],[1700,100,20,160],
    [2000,80,200,20],[2180,80,20,180],
    [2300,150,180,20],[2300,150,20,130],
    [300,1400,200,20],[300,1400,20,180],[300,1560,200,20],
    [600,1300,20,220],[600,1300,200,20],
    [900,1400,200,20],[900,1400,20,180],[1080,1400,20,180],
    [1200,1300,200,20],[1200,1500,200,20],[1380,1300,20,220],
    [1500,1380,200,20],[1500,1380,20,180],
    [1800,1300,200,20],[1800,1300,20,200],[1980,1300,20,200],
    [2100,1400,200,20],[2100,1400,20,200],
    [2350,1300,200,20],[2520,1300,20,200],
    [100,900,180,20],[100,900,20,200],[260,900,20,200],
    [2400,850,200,20],[2400,850,20,200],[2580,850,20,200],
    [100,1100,200,20],[2400,1100,200,20],
    [1100,900,20,250],[1100,900,200,20],[1280,900,20,250],[1100,1130,200,20],
    [1400,1000,200,20],[1580,1000,20,200],[1400,1180,200,20],[1400,1000,20,200],
    [600,1050,160,20],[600,1050,20,160],[740,1050,20,160],
  ];

  walls.forEach(([x,y,w,h]) => obs.push({ x, y, w, h, type: "wall" }));

  for (let i = 0; i < 60; i++) {
    const x = 100 + Math.random() * (WORLD_W - 200);
    const y = 100 + Math.random() * (WORLD_H - 200);
    const w = 30 + Math.random() * 50;
    const h = 20 + Math.random() * 40;
    if (Math.hypot(x - WORLD_W/2, y - WORLD_H/2) > 200) {
      obs.push({ x, y, w, h, type: "box" });
    }
  }
  return obs;
}

function buildSpawnZones() {
  const z = [];
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const r = Math.min(WORLD_W, WORLD_H) * 0.45;
    z.push({ x: WORLD_W/2 + Math.cos(a)*r, y: WORLD_H/2 + Math.sin(a)*r });
  }
  return z;
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function circleRect(cx,cy,cr,rx,ry,rw,rh) {
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  return Math.hypot(cx-nx,cy-ny) < cr;
}
function isBlocked(nx,ny,size) {
  const r = size * 0.44;
  for (const o of G.obstacles) {
    if (circleRect(nx,ny,r,o.x,o.y,o.w,o.h)) return true;
  }
  return false;
}

function getWeapon() { return G.weapons[G.activeWeapon]; }
function weaponDmg(w) { return Math.floor(w.baseDmg * (1 + w.level * 0.18)); }
function weaponCd(w)  { return Math.max(4, Math.floor(w.baseCd * (1 - w.level * 0.05))); }

function switchWeapon(i) {
  if (!G.weapons[i] || !G.weapons[i].unlocked) return;
  G.weapons.forEach((w,j) => w.active = j===i);
  G.activeWeapon = i;
  updateWeaponUI();
}

function updateWeaponUI() {
  const icons = ["1·","2·","3·","4·","5·"];
  G.weapons.forEach((w, i) => {
    const el = document.getElementById("ws-"+i);
    if (!el) return;
    el.className = "wslot" + (w.active?" active":"") + (!w.unlocked?" locked":"") + (w.unlocked&&w.level>0&&!w.active?" upgraded":"");
    el.textContent = icons[i] + " " + w.name + (w.unlocked&&w.level>0?" Lv"+(w.level+1):"");
  });
}

function doShoot() {
  const p = G.player; const w = getWeapon();
  if (G.cd.shoot > 0) return;
  const wx = G.mouse.x + G.cam.x;
  const wy = G.mouse.y + G.cam.y;
  const dx = wx - p.x, dy = wy - p.y;
  const d = Math.hypot(dx, dy) || 1;
  const bx = dx/d, by = dy/d;

  for (let i = 0; i < w.count; i++) {
    const sx = (Math.random()-0.5)*w.spread;
    const sy = (Math.random()-0.5)*w.spread;
    const nx = bx+sx, ny = by+sy;
    const nl = Math.hypot(nx,ny)||1;
    G.bullets.push({
      x: p.x, y: p.y,
      dx: nx/nl, dy: ny/nl,
      speed: w.bulletSpd,
      damage: weaponDmg(w),
      color: w.color,
      size: w.bulletSize,
      pierce: !!w.pierce,
      rocket: !!w.rocket,
      life: 120,
      enemy: false,
    });
  }
  G.cd.shoot = weaponCd(w);
  G.screenShake = w.rocket ? 6 : 3;
  spawnParticle(p.x, p.y, w.color, 3);
}

const ENEMY_DEF = {
  zombie:   { hp:80,   spd:1.3, size:20, color:"#cc3333", xp:8,  score:10, shape:"sq",   name:"Zombie",   dmg:4   },
  runner:   { hp:45,   spd:2.8, size:14, color:"#ff8833", xp:12, score:15, shape:"tri",  name:"Runner",   dmg:3   },
  tank:     { hp:280,  spd:0.8, size:32, color:"#9944dd", xp:22, score:30, shape:"sq",   name:"Tank",     dmg:7   },
  shooter:  { hp:70,   spd:1.0, size:17, color:"#3399ff", xp:15, score:20, shape:"circ", name:"Shooter",  dmg:2,   shootCd:0, shootRange:280 },
  exploder: { hp:55,   spd:2.0, size:17, color:"#ffee00", xp:18, score:22, shape:"dia",  name:"Exploder", dmg:0   },
  specter:  { hp:50,   spd:2.4, size:16, color:"#aaffcc", xp:20, score:28, shape:"circ", name:"Specter",  dmg:3,   phase:true },
  brute:    { hp:420,  spd:1.3, size:36, color:"#ff6600", xp:35, score:50, shape:"sq",   name:"Brute",    dmg:10  },
  sniper:   { hp:60,   spd:0.85,size:16, color:"#ff44cc", xp:20, score:25, shape:"tri",  name:"Sniper",   dmg:2,   shootCd:0, shootRange:520, bulletSpd:14 },
  boss:     { hp:900,  spd:1.1, size:48, color:"#ff1111", xp:100,score:300,shape:"boss", name:"BOSS",     dmg:12,  shootCd:0 },
  megaboss: { hp:2200, spd:1.3, size:60, color:"#ff0066", xp:250,score:800,shape:"boss", name:"MEGABOSS", dmg:18,  shootCd:0 },
};

function makeEnemy(typeKey, wave) {
  const def = ENEMY_DEF[typeKey];
  const scale = 1 + wave * 0.09;
  const e = {
    ...def,
    type: typeKey,
    hp: Math.floor(def.hp * scale),
    maxHp: Math.floor(def.hp * scale),
    spd: def.spd * (1 + wave * 0.035),
    shootCd: def.shootCd || 0,
    x: 0, y: 0,
  };
  return e;
}

function spawnEnemy(e) {
  const p = G.player;
  let attempts = 0;
  while (attempts < 30) {
    const zone = G.spawnZones[Math.floor(Math.random() * G.spawnZones.length)];
    const rx = zone.x + (Math.random()-0.5)*300;
    const ry = zone.y + (Math.random()-0.5)*300;
    const cx = Math.max(50, Math.min(WORLD_W-50, rx));
    const cy = Math.max(50, Math.min(WORLD_H-50, ry));
    if (!isBlocked(cx, cy, e.size) && Math.hypot(cx-p.x, cy-p.y) > 350) {
      e.x = cx; e.y = cy;
      G.enemies.push(e);
      return;
    }
    attempts++;
  }
  e.x = Math.random()<0.5 ? 60 : WORLD_W-60;
  e.y = Math.random() * WORLD_H;
  G.enemies.push(e);
}

function getWaveComposition(wave) {
  const pool = [];
  const add = (type, n) => { for(let i=0;i<n;i++) pool.push(type); };

  if (wave <= 2) {
    add("zombie", 4 + wave*2);
    if (wave >= 2) add("runner", 2);
  } else if (wave <= 4) {
    add("zombie", 3 + wave);
    add("runner", 2 + wave);
    if (wave >= 4) add("tank", 1);
  } else if (wave <= 7) {
    add("zombie", 2 + wave);
    add("runner", 3 + wave);
    add("tank", 1 + Math.floor(wave/3));
    add("shooter", 2 + Math.floor(wave/2));
    if (wave >= 6) add("exploder", 2);
  } else if (wave <= 12) {
    add("zombie", wave);
    add("runner", wave);
    add("tank", Math.floor(wave/2));
    add("shooter", Math.floor(wave/2));
    add("exploder", 3);
    if (wave >= 9)  add("specter", 4);
    if (wave >= 11) add("brute", 2);
  } else {
    add("runner", wave);
    add("tank", Math.floor(wave/2));
    add("shooter", Math.floor(wave/2));
    add("exploder", Math.floor(wave/3));
    add("specter", Math.floor(wave/3));
    add("brute", Math.floor(wave/4));
    add("sniper", Math.floor(wave/5));
  }

  return pool;
}

function startWave() {
  const wave = G.wave;
  const pool = getWaveComposition(wave);
  const isBossWave = (wave % 5 === 0);
  const isMegaBossWave = (wave % 15 === 0);

  G.waveEnemyCount = pool.length + (isBossWave ? 1 : 0) + (isMegaBossWave ? 1 : 0);
  G.killsThisWave = 0;

  pool.forEach((type, i) => {
    setTimeout(() => {
      if (!G.gameOver) spawnEnemy(makeEnemy(type, wave));
    }, i * 280);
  });

  if (isMegaBossWave) {
    setTimeout(() => {
      if (!G.gameOver) { spawnEnemy(makeEnemy("megaboss", wave)); showMsg("MEGABOSS XUAT HIEN! WAVE "+wave); }
    }, 500);
  } else if (isBossWave) {
    setTimeout(() => {
      if (!G.gameOver) { spawnEnemy(makeEnemy("boss", wave)); showMsg("BOSS WAVE "+wave+" !"); }
    }, 400);
  } else {
    showMsg("WAVE "+wave+" — "+pool.length+" ke thu!");
  }

  G.waveActive = true;
}

function spawnParticle(x, y, color, count=6, big=false) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 0.8 + Math.random() * (big ? 5 : 3);
    G.particles.push({
      x, y,
      dx: Math.cos(a)*spd, dy: Math.sin(a)*spd,
      life: big ? 45 : 28,
      maxLife: big ? 45 : 28,
      color,
      size: big ? 3+Math.random()*5 : 1.5+Math.random()*3,
    });
  }
}

function showMsg(txt) {
  G.msg = txt; G.msgTimer = 150;
  document.getElementById("msg-bar").textContent = txt;
  document.getElementById("msg-bar").style.opacity = "1";
}

function tryLevelUp() {
  const p = G.player;
  const needed = p.level * 70;
  if (p.exp < needed) return;
  p.exp -= needed;
  p.level++;
  p.maxHp = 100 + p.level * 10;
  p.hp = Math.min(p.maxHp, p.hp + 30);
  p.speed = 3.2 + p.level * 0.05;
  spawnParticle(p.x, p.y, "#ffee00", 20, true);
  unlockUpgradeWeapon(p.level);
  showMsg("LEVEL "+p.level+"! Max HP & toc do tang!");
}

function unlockUpgradeWeapon(lv) {
  const ws = G.weapons;
  if (lv === 3  && !ws[1].unlocked) { ws[1].unlocked=true; showMsg("SHOTGUN MO KHOA! (phim 2)"); updateWeaponUI(); return; }
  if (lv === 5  && !ws[2].unlocked) { ws[2].unlocked=true; showMsg("RAPID FIRE MO KHOA! (phim 3)"); updateWeaponUI(); return; }
  if (lv === 8  && !ws[3].unlocked) { ws[3].unlocked=true; showMsg("SNIPER MO KHOA! (phim 4)"); updateWeaponUI(); return; }
  if (lv === 11 && !ws[4].unlocked) { ws[4].unlocked=true; showMsg("ROCKET MO KHOA! (phim 5)"); updateWeaponUI(); return; }
  const idx = (lv - 2) % ws.filter(w=>w.unlocked).length;
  if (ws[idx]) {
    ws[idx].level = Math.min(ws[idx].level + 1, 5);
    showMsg(ws[idx].name+" -> Lv"+(ws[idx].level+1));
    updateWeaponUI();
  }
}

function hasLOS(x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const dist = Math.hypot(dx,dy);
  if (dist < 1) return true;
  const steps = Math.ceil(dist / 18);
  const sx = dx/steps, sy = dy/steps;
  for (let i = 1; i < steps; i++) {
    const tx = x1 + sx*i, ty = y1 + sy*i;
    for (const o of G.obstacles) {
      if (tx>o.x && tx<o.x+o.w && ty>o.y && ty<o.y+o.h) return false;
    }
  }
  return true;
}

function update() {
  if (G.gameOver) return;
  G.tick++;
  const p = G.player;
  const keys = G.keys;

  for (const k in G.cd) if (G.cd[k] > 0) G.cd[k]--;
  if (p.iframes > 0) p.iframes--;
  if (p.dashActive > 0) p.dashActive--;
  if (G.screenShake > 0) G.screenShake *= 0.8;

  let mx=0, my=0;
  if (keys["w"]||keys["ArrowUp"])    my=-1;
  if (keys["s"]||keys["ArrowDown"])  my= 1;
  if (keys["a"]||keys["ArrowLeft"])  mx=-1;
  if (keys["d"]||keys["ArrowRight"]) mx= 1;
  if (mx&&my) { mx*=0.707; my*=0.707; }

  if ((keys["Shift"]||keys[" "]) && G.cd.dash<=0 && (mx||my)) {
    G.cd.dash = 100;
    p.dashActive = 14;
    G.screenShake = 10;
    spawnParticle(p.x, p.y, "#4488ff", 14, true);
  }

  const spd = p.speed * (p.dashActive > 0 ? 4.5 : 1);
  const nx = p.x + mx * spd;
  const ny = p.y + my * spd;
  const clampX = Math.max(p.size/2+22, Math.min(WORLD_W-p.size/2-22, nx));
  const clampY = Math.max(p.size/2+22, Math.min(WORLD_H-p.size/2-22, ny));
  if (!isBlocked(clampX, p.y, p.size)) p.x = clampX;
  if (!isBlocked(p.x, clampY, p.size)) p.y = clampY;

  if (keys["e"] && G.cd.bomb <= 0) {
    G.cd.bomb = 300; G.screenShake = 22;
    let hit = 0;
    G.enemies.forEach(e => {
      if (Math.hypot(p.x-e.x, p.y-e.y) < 200) {
        e.hp -= 100; hit++;
        spawnParticle(e.x, e.y, e.color, 10, true);
      }
    });
    spawnParticle(p.x, p.y, "#ff8800", 28, true);
    showMsg("Bom phat no! Trung "+hit+" ke thu!");
  }

  if (keys["mouse"] && G.cd.shoot <= 0) doShoot();

  for (let i = G.bullets.length-1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += b.dx * b.speed;
    b.y += b.dy * b.speed;
    b.life--;
    if (b.life <= 0 || b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H) {
      G.bullets.splice(i,1); continue;
    }
    if (!b.enemy) {
      let wallHit = false;
      for (const o of G.obstacles) {
        if (circleRect(b.x,b.y,b.size,o.x,o.y,o.w,o.h)) { wallHit=true; break; }
      }
      if (wallHit) {
        if (b.rocket) rocketExplode(b);
        else spawnParticle(b.x, b.y, b.color, 3);
        G.bullets.splice(i,1); continue;
      }
      let removed = false;
      for (let j = G.enemies.length-1; j >= 0; j--) {
        const e = G.enemies[j];
        if (Math.hypot(b.x-e.x,b.y-e.y) < e.size/2+b.size) {
          e.hp -= b.damage;
          spawnParticle(b.x, b.y, b.color, 4);
          if (e.hp <= 0) killEnemy(j);
          if (!b.pierce && !b.rocket) { G.bullets.splice(i,1); removed=true; break; }
          if (b.rocket) { rocketExplode(b); G.bullets.splice(i,1); removed=true; break; }
        }
      }
    } else {
      let enemyBulletWallHit = false;
      for (const o of G.obstacles) {
        if (circleRect(b.x,b.y,b.size,o.x,o.y,o.w,o.h)) { enemyBulletWallHit=true; break; }
      }
      if (enemyBulletWallHit) { spawnParticle(b.x,b.y,"#ff4444",2); G.bullets.splice(i,1); continue; }
      if (Math.hypot(b.x-p.x,b.y-p.y) < p.size/2+b.size && p.iframes<=0) {
        p.hp -= b.damage; p.iframes = 22;
        G.screenShake = 8; G.bullets.splice(i,1);
        spawnParticle(p.x, p.y, "#ff3333", 6);
      }
    }
  }

  for (let i = G.enemies.length-1; i >= 0; i--) {
    const e = G.enemies[i];
    const dx = p.x-e.x, dy = p.y-e.y;
    const dist = Math.hypot(dx,dy)||1;
    const ndx = dx/dist, ndy = dy/dist;

    if (e.phase) {
      e.x += ndx*e.spd; e.y += ndy*e.spd;
    } else {
      const canSee = hasLOS(e.x, e.y, p.x, p.y);
      if (canSee) {
        e.steerAngle = 0; e.steerDir = null;
        const ex=e.x+ndx*e.spd, ey=e.y+ndy*e.spd;
        if (!isBlocked(ex,e.y,e.size)) e.x=ex;
        else if (!isBlocked(e.x,ey,e.size)) e.y=ey;
        else {
          for (const a of [0.6,-0.6,1.2,-1.2,1.8,-1.8]) {
            const ca=Math.cos(a),sa=Math.sin(a);
            const sx=e.x+(ndx*ca-ndy*sa)*e.spd, sy=e.y+(ndx*sa+ndy*ca)*e.spd;
            if (!isBlocked(sx,sy,e.size)){e.x=sx;e.y=sy;break;}
          }
        }
      } else {
        if (!e.steerDir) e.steerDir = Math.random()<0.5?1:-1;
        if (!e.steerAngle) e.steerAngle = 0;
        e.steerAngle = Math.min(e.steerAngle+0.05, Math.PI*1.2);
        const a = e.steerAngle * e.steerDir;
        const ca=Math.cos(a),sa=Math.sin(a);
        const sx=e.x+(ndx*ca-ndy*sa)*e.spd, sy=e.y+(ndx*sa+ndy*ca)*e.spd;
        if (!isBlocked(sx,sy,e.size)) {
          e.x=sx; e.y=sy;
          e.steerAngle=Math.max(0,e.steerAngle-0.03);
        } else {
          const a2=-a, ca2=Math.cos(a2),sa2=Math.sin(a2);
          const sx2=e.x+(ndx*ca2-ndy*sa2)*e.spd, sy2=e.y+(ndx*sa2+ndy*ca2)*e.spd;
          if (!isBlocked(sx2,sy2,e.size)){e.x=sx2;e.y=sy2;e.steerDir*=-1;}
        }
      }
    }
    e.x=Math.max(30,Math.min(WORLD_W-30,e.x));
    e.y=Math.max(30,Math.min(WORLD_H-30,e.y));

    if (e.type==="exploder" && dist < 38) {
      p.hp -= 55; p.iframes=40; G.screenShake=20;
      spawnParticle(e.x, e.y, "#ffee00", 24, true);
      G.enemies.splice(i,1); G.killsThisWave++; continue;
    }

    if (e.shootCd !== undefined) {
      e.shootCd--;
      const range = e.shootRange||(e.type==="boss"||e.type==="megaboss"?520:280);
      if (e.shootCd<=0 && dist<range && hasLOS(e.x,e.y,p.x,p.y)) {
        e.shootCd = e.type==="boss"?35:e.type==="megaboss"?20:e.type==="sniper"?90:80;
        const shots = e.type==="megaboss"?5:1;
        for (let s=0;s<shots;s++) {
          const spread=(shots>1)?(s/(shots-1)-0.5)*0.5:0;
          G.bullets.push({
            x:e.x,y:e.y,
            dx:ndx+spread*(-ndy), dy:ndy+spread*ndx,
            speed:e.bulletSpd||5,
            damage:e.type==="sniper"?35:e.type==="megaboss"?28:18,
            color:e.type==="megaboss"?"#ff0066":"#ff6666",
            size:5,enemy:true,life:220
          });
        }
      }
    }

    if (dist < e.size/2+p.size/2 && p.iframes<=0) {
      p.hp -= e.dmg; p.iframes=30;
      G.screenShake=5;
      spawnParticle(p.x,p.y,"#ff3333",5);
    }
  }

  for (let i = G.medkits.length-1; i >= 0; i--) {
    const m = G.medkits[i];
    m.pulse = (m.pulse||0)+0.1;
    if (Math.hypot(p.x-m.x, p.y-m.y) < 24) {
      const heal = 20 + Math.floor(Math.random()*25);
      p.hp = Math.min(p.maxHp, p.hp+heal);
      G.medkits.splice(i,1);
      showMsg("+"+heal+" HP!");
      spawnParticle(m.x, m.y, "#ff88aa", 10, true);
    }
  }

  for (let i = G.particles.length-1; i >= 0; i--) {
    const pt = G.particles[i];
    pt.x+=pt.dx; pt.y+=pt.dy; pt.dx*=0.9; pt.dy*=0.9; pt.life--;
    if (pt.life<=0) G.particles.splice(i,1);
  }

  tryLevelUp();

  if (G.waveActive && G.enemies.length===0) {
    G.waveActive=false;
    G.betweenWaveCountdown=240;
    showMsg("Wave "+G.wave+" hoan thanh!");
    for (let i=0;i<2;i++) {
      G.medkits.push({
        x: p.x + (Math.random()-0.5)*200,
        y: p.y + (Math.random()-0.5)*200,
        size:14, pulse:0
      });
    }
  }
  if (!G.waveActive && G.betweenWaveCountdown>0) {
    G.betweenWaveCountdown--;
    if (G.betweenWaveCountdown<=0) {
      G.wave++;
      startWave();
    }
  }

  const targetCx = p.x - SCREEN_W/2;
  const targetCy = p.y - SCREEN_H/2;
  G.cam.x += (targetCx - G.cam.x) * 0.1;
  G.cam.y += (targetCy - G.cam.y) * 0.1;
  G.cam.x = Math.max(0, Math.min(WORLD_W-SCREEN_W, G.cam.x));
  G.cam.y = Math.max(0, Math.min(WORLD_H-SCREEN_H, G.cam.y));

  if (p.hp <= 0) {
    p.hp = 0;
    G.gameOver = true;
    setTimeout(showGameOver, 800);
  }

  updateHUD();
}

function rocketExplode(b) {
  const radius = 110;
  spawnParticle(b.x, b.y, "#ff5500", 22, true);
  spawnParticle(b.x, b.y, "#ffaa00", 14, true);
  G.screenShake = 16;
  for (let j = G.enemies.length-1; j >= 0; j--) {
    const e = G.enemies[j];
    const d = Math.hypot(b.x-e.x, b.y-e.y);
    if (d < radius) {
      e.hp -= b.damage * (1 - d/radius * 0.6);
      if (e.hp <= 0) killEnemy(j);
    }
  }
  const p = G.player;
  if (Math.hypot(b.x-p.x, b.y-p.y) < radius && p.iframes<=0) {
    p.hp -= 20; p.iframes=30;
  }
}

function killEnemy(j) {
  const e = G.enemies[j];
  spawnParticle(e.x, e.y, e.color, e.type==="boss"||e.type==="megaboss"?30:12, e.size>30);
  G.player.exp   += e.xp;
  G.player.score += e.score;
  G.player.kills++;
  G.killsThisWave++;
  if (Math.random() < 0.18 || e.type==="boss" || e.type==="megaboss") {
    G.medkits.push({ x:e.x, y:e.y, size:14, pulse:0 });
  }
  G.enemies.splice(j, 1);
}

function updateHUD() {
  const p = G.player;
  const hpPct = Math.max(0, p.hp/p.maxHp*100);
  document.getElementById("hp-bar-inner").style.width = hpPct+"%";
  document.getElementById("hp-bar-inner").style.background = hpPct>50?"#33cc44":hpPct>25?"#ffaa00":"#ee2222";
  document.getElementById("hp-text").textContent = Math.ceil(p.hp)+"/"+p.maxHp;
  document.getElementById("xp-bar-inner").style.width = (p.exp/(p.level*70)*100)+"%";
  document.getElementById("lv-text").textContent = p.level;
  document.getElementById("wave-text").textContent = G.wave;
  document.getElementById("kill-text").textContent = p.kills;
  document.getElementById("score-text").textContent = p.score;
  const bcd = document.getElementById("bomb-cd");
  const dcd = document.getElementById("dash-cd");
  bcd.textContent = G.cd.bomb>0 ? Math.ceil(G.cd.bomb/60)+"s" : "READY";
  bcd.style.color = G.cd.bomb>0?"#666":"#fa0";
  dcd.textContent = G.cd.dash>0 ? Math.ceil(G.cd.dash/60)+"s" : "READY";
  dcd.style.color = G.cd.dash>0?"#666":"#4af";
  if (G.msgTimer>0) { G.msgTimer--; if(G.msgTimer===0) document.getElementById("msg-bar").style.opacity="0"; }
}

function showGameOver() {
  const p = G.player;
  document.getElementById("final-stats").innerHTML =
    "Score: <b>"+p.score+"</b><br>Wave: <b>"+G.wave+"</b><br>Kills: <b>"+p.kills+"</b><br>Level: <b>"+p.level+"</b>";
  document.getElementById("overlay").style.display="flex";
}

function restartGame() {
  document.getElementById("overlay").style.display="none";
  initState();
  updateWeaponUI();
  startWave();
}

function draw() {
  const shx = (Math.random()-0.5)*G.screenShake;
  const shy = (Math.random()-0.5)*G.screenShake;
  ctx.setTransform(1,0,0,1,shx,shy);
  ctx.clearRect(-10,-10,SCREEN_W+20,SCREEN_H+20);

  const cx = Math.round(G.cam.x), cy = Math.round(G.cam.y);

  ctx.fillStyle = "#0c0c14";
  ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

  const gs = TILE;
  const startX = Math.floor(cx/gs)*gs - cx;
  const startY = Math.floor(cy/gs)*gs - cy;
  ctx.strokeStyle="rgba(255,255,255,0.025)";
  ctx.lineWidth=1;
  for (let x=startX; x<SCREEN_W+gs; x+=gs) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,SCREEN_H); ctx.stroke();
  }
  for (let y=startY; y<SCREEN_H+gs; y+=gs) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(SCREEN_W,y); ctx.stroke();
  }

  G.obstacles.forEach(o => {
    const sx=o.x-cx, sy=o.y-cy;
    if (sx+o.w<-10||sx>SCREEN_W+10||sy+o.h<-10||sy>SCREEN_H+10) return;
    if (o.type==="wall") {
      ctx.fillStyle="#1e1e2e";
      ctx.fillRect(sx,sy,o.w,o.h);
      ctx.strokeStyle="#334";
      ctx.lineWidth=1;
      ctx.strokeRect(sx,sy,o.w,o.h);
    } else {
      ctx.fillStyle="#1a2230";
      ctx.fillRect(sx,sy,o.w,o.h);
      ctx.strokeStyle="#2a3a50";
      ctx.lineWidth=1;
      ctx.strokeRect(sx,sy,o.w,o.h);
      ctx.strokeStyle="rgba(255,255,255,0.05)";
      ctx.strokeRect(sx+2,sy+2,o.w-4,o.h-4);
    }
  });

  ctx.save();
  G.particles.forEach(pt => {
    const alpha = pt.life/pt.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x-cx, pt.y-cy, pt.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.restore();

  G.medkits.forEach(m => {
    const sx=m.x-cx, sy=m.y-cy + Math.sin(m.pulse)*3;
    if (sx<-30||sx>SCREEN_W+30||sy<-30||sy>SCREEN_H+30) return;
    ctx.fillStyle="rgba(255,80,100,0.15)";
    ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#ee4466";
    ctx.fillRect(sx-7,sy-7,14,14);
    ctx.fillStyle="#fff";
    ctx.fillRect(sx-1.5,sy-6,3,12);
    ctx.fillRect(sx-6,sy-1.5,12,3);
  });

  G.enemies.forEach(e => drawEnemy(e, cx, cy));
  drawPlayer(cx, cy);

  G.bullets.forEach(b => {
    const bsx=b.x-cx, bsy=b.y-cy;
    if (bsx<-20||bsx>SCREEN_W+20||bsy<-20||bsy>SCREEN_H+20) return;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(bsx,bsy,b.size,0,Math.PI*2);
    ctx.fill();
    if (b.rocket) {
      ctx.strokeStyle="#ff8800";
      ctx.lineWidth=2;
      ctx.stroke();
    }
    if (b.enemy) {
      ctx.strokeStyle="rgba(255,80,80,0.4)";
      ctx.lineWidth=2; ctx.stroke();
    }
  });

  const vg = ctx.createRadialGradient(SCREEN_W/2,SCREEN_H/2,SCREEN_H*0.3,SCREEN_W/2,SCREEN_H/2,SCREEN_H*0.8);
  vg.addColorStop(0,"rgba(0,0,0,0)");
  vg.addColorStop(1,"rgba(0,0,0,0.45)");
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

  if (!G.waveActive && G.betweenWaveCountdown>0) {
    ctx.setTransform(1,0,0,1,0,0);
    const secs = Math.ceil(G.betweenWaveCountdown/60);
    ctx.font="bold 22px 'Courier New'";
    ctx.textAlign="center";
    ctx.fillStyle="#fa0";
    ctx.fillText("Wave tiep theo: "+secs+"s", SCREEN_W/2, SCREEN_H/2);
  }

  ctx.setTransform(1,0,0,1,0,0);
  drawMinimap();
}

function drawPlayer(cx, cy) {
  const p = G.player;
  const sx = p.x-cx, sy = p.y-cy;
  ctx.save();
  ctx.translate(sx, sy);

  const wx = G.mouse.x + G.cam.x;
  const wy = G.mouse.y + G.cam.y;
  const angle = Math.atan2(wy-p.y, wx-p.x);
  ctx.rotate(angle);

  if (p.iframes>0 && Math.floor(p.iframes/3)%2===0) ctx.globalAlpha=0.35;

  ctx.fillStyle="rgba(0,255,80,0.12)";
  ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill();

  ctx.fillStyle="#22ee55";
  ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#88ffaa";
  ctx.lineWidth=2; ctx.stroke();

  ctx.fillStyle="#aaaacc";
  ctx.fillRect(p.size/2-1,-2.5,13,5);
  ctx.fillStyle="#8888aa";
  ctx.fillRect(p.size/2+8,-1.5,5,3);

  if (p.dashActive>0) {
    ctx.globalAlpha=0.25;
    ctx.fillStyle="#4466ff";
    ctx.beginPath(); ctx.arc(0,0,p.size+4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  ctx.restore();

  if (G.cd.bomb > 0) {
    const alpha = 0.08 * (G.cd.bomb/300);
    ctx.strokeStyle=`rgba(255,160,0,${alpha+0.05})`;
    ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(sx,sy,200,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawEnemy(e, cx, cy) {
  const sx=e.x-cx, sy=e.y-cy;
  if (sx<-60||sx>SCREEN_W+60||sy<-60||sy>SCREEN_H+60) return;
  ctx.save();
  ctx.translate(sx, sy);

  const isBoss = e.type==="boss"||e.type==="megaboss";

  if (isBoss) {
    const pulse = Math.sin(G.tick*0.07)*5;
    ctx.shadowBlur=18; ctx.shadowColor=e.color;
    ctx.strokeStyle=e.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,e.size/2+pulse+6,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }

  ctx.fillStyle=e.color;
  const r=e.size/2;
  switch(e.shape) {
    case "sq":
      ctx.fillRect(-r,-r,e.size,e.size);
      break;
    case "tri":
      ctx.beginPath();
      ctx.moveTo(0,-r); ctx.lineTo(r,r); ctx.lineTo(-r,r); ctx.closePath(); ctx.fill();
      break;
    case "circ":
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
      break;
    case "dia":
      ctx.beginPath();
      ctx.moveTo(0,-r); ctx.lineTo(r,0); ctx.lineTo(0,r); ctx.lineTo(-r,0); ctx.closePath(); ctx.fill();
      break;
    case "boss":
      ctx.fillRect(-r,-r,e.size,e.size);
      ctx.fillStyle=e.type==="megaboss"?"#ff66aa":"#ff8888";
      ctx.font="bold "+(r*0.6)+"px monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(e.type==="megaboss"?"B":"!",0,0);
      break;
  }

  const bw=e.size+6, bh=4, bx=-bw/2, by_=-r-10;
  const hpR=Math.max(0,e.hp/e.maxHp);
  ctx.fillStyle="#111"; ctx.fillRect(bx,by_,bw,bh);
  ctx.fillStyle=hpR>0.5?"#33cc44":hpR>0.25?"#ffaa00":"#ee2222";
  ctx.fillRect(bx,by_,bw*hpR,bh);

  if (isBoss || e.type==="tank" || e.type==="brute") {
    ctx.fillStyle="#fff"; ctx.font="8px monospace"; ctx.textAlign="center";
    ctx.fillText(e.name, 0, -r-13);
  }

  ctx.restore();
}

function drawMinimap() {
  const mw=120, mh=80;
  const sx=WORLD_W/mw, sy=WORLD_H/mh;
  mctx.fillStyle="#0a0a12";
  mctx.fillRect(0,0,mw,mh);

  mctx.fillStyle="#222";
  G.obstacles.forEach(o=>{
    mctx.fillRect(o.x/sx,o.y/sy,Math.max(1,o.w/sx),Math.max(1,o.h/sy));
  });

  G.enemies.forEach(e=>{
    mctx.fillStyle=e.color;
    const ex=e.x/sx, ey=e.y/sy;
    mctx.fillRect(ex-1,ey-1,3,3);
  });

  mctx.fillStyle="#ff4466";
  G.medkits.forEach(m=>{
    mctx.fillRect(m.x/sx-1,m.y/sy-1,3,3);
  });

  const p=G.player;
  mctx.fillStyle="#22ff55";
  mctx.beginPath();
  mctx.arc(p.x/sx,p.y/sy,3,0,Math.PI*2);
  mctx.fill();

  mctx.strokeStyle="rgba(255,255,255,0.25)";
  mctx.lineWidth=1;
  mctx.strokeRect(G.cam.x/sx,G.cam.y/sy,SCREEN_W/sx,SCREEN_H/sy);
}

document.addEventListener("keydown", e => {
  G.keys[e.key] = true;
  if (!G.gameOver) {
    if(e.key==="1") switchWeapon(0);
    if(e.key==="2") switchWeapon(1);
    if(e.key==="3") switchWeapon(2);
    if(e.key==="4") switchWeapon(3);
    if(e.key==="5") switchWeapon(4);
  }
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
});
document.addEventListener("keyup", e => { G.keys[e.key]=false; });

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  G.mouse.x = e.clientX - r.left;
  G.mouse.y = e.clientY - r.top;
});
canvas.addEventListener("mousedown", e => {
  G.keys["mouse"] = true;
  const r = canvas.getBoundingClientRect();
  G.mouse.x = e.clientX - r.left;
  G.mouse.y = e.clientY - r.top;
  if (!G.gameOver) doShoot();
});
canvas.addEventListener("mouseup", () => { G.keys["mouse"]=false; });
canvas.addEventListener("contextmenu", e => e.preventDefault());

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initState();
updateWeaponUI();
startWave();

setInterval(() => {
  if(!G.gameOver && G.medkits.length<8) {
    const p=G.player;
    G.medkits.push({x:p.x+(Math.random()-0.5)*400,y:p.y+(Math.random()-0.5)*400,size:14,pulse:0});
  }
}, 8000);

loop();
</script>
</body>
</html>
